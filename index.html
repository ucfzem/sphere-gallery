<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spherical Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; color: #fff; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; cursor: grab; user-select: none; }
  body:active { cursor: grabbing; }
  #canvas { position: fixed; inset: 0; z-index: 1; display: block; }
  #grain { position: fixed; inset: 0; z-index: 2; pointer-events: none; mix-blend-mode: overlay; opacity: 0.035; }
  .header { position: fixed; top: 0; left: 0; right: 0; z-index: 10; display: flex; justify-content: space-between; align-items: center; padding: 2rem 3rem; pointer-events: none; }
  .header__logo { font-size: 0.75rem; font-weight: 600; letter-spacing: 0.2em; color: rgba(255,255,255,0.5); }
  .header__nav { display: flex; gap: 2rem; font-size: 0.7rem; font-weight: 400; letter-spacing: 0.1em; color: rgba(255,255,255,0.25); }
  .counter { position: fixed; bottom: 2rem; left: 3rem; z-index: 10; font-size: 0.75rem; font-weight: 400; letter-spacing: 0.1em; color: rgba(255,255,255,0.2); font-variant-numeric: tabular-nums; }
  .label { position: fixed; bottom: 2rem; right: 3rem; z-index: 10; text-align: right; pointer-events: none; }
  .label__index { font-size: 0.65rem; font-weight: 400; letter-spacing: 0.15em; color: rgba(255,255,255,0.2); margin-bottom: 0.35rem; }
  .label__title { font-size: 1.1rem; font-weight: 300; letter-spacing: 0.02em; color: rgba(255,255,255,0.85); }
  .label__sub { font-size: 0.7rem; font-weight: 400; letter-spacing: 0.08em; color: rgba(255,255,255,0.3); margin-top: 0.2rem; }
  .hint { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); z-index: 10; font-size: 0.6rem; font-weight: 400; letter-spacing: 0.18em; color: rgba(255,255,255,0.12); text-transform: uppercase; }
  .overlay { position: fixed; inset: 0; z-index: 20; display: flex; align-items: center; justify-content: center; pointer-events: none; opacity: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
  .overlay.active { pointer-events: auto; opacity: 1; }
  .overlay__inner { width: 100%; max-width: 900px; padding: 2rem; }
  .overlay__close { background: none; border: none; color: rgba(255,255,255,0.5); font-family: 'Inter', sans-serif; font-size: 0.75rem; letter-spacing: 0.15em; cursor: pointer; padding: 0.5rem 0; margin-bottom: 2rem; transition: color 0.3s; }
  .overlay__close:hover { color: rgba(255,255,255,0.9); }
  .overlay__content { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; align-items: start; }
  .overlay__img { width: 100%; aspect-ratio: 4/3; background: #1a1a1a; border-radius: 4px; overflow: hidden; background-size: cover; background-position: center; }
  .overlay__text h1 { font-size: 2rem; font-weight: 300; letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 1.5rem; color: rgba(255,255,255,0.95); }
  .overlay__text p { font-size: 0.85rem; font-weight: 300; line-height: 1.7; color: rgba(255,255,255,0.5); margin-bottom: 2rem; }
  .overlay__tag { display: inline-block; font-size: 0.6rem; font-weight: 500; letter-spacing: 0.2em; color: rgba(255,255,255,0.3); border: 1px solid rgba(255,255,255,0.1); padding: 0.4rem 0.8rem; border-radius: 2px; }
  @media (max-width: 768px) {
    .header { padding: 1.2rem 1.5rem; }
    .header__nav { display: none; }
    .counter { left: 1.5rem; bottom: 1.2rem; }
    .label { right: 1.5rem; bottom: 1.2rem; }
    .label__title { font-size: 0.9rem; }
    .hint { display: none; }
    .overlay__content { grid-template-columns: 1fr; gap: 1.5rem; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="header__logo">SPHERE</div>
  <nav class="header__nav"><span>EXHIBITS</span><span>INFO</span><span>CONTACT</span></nav>
</header>

<div class="counter"><span id="currIdx">01</span> &mdash; <span id="totalCount">36</span></div>

<div class="label">
  <div class="label__index" id="lblIdx">01</div>
  <div class="label__title" id="lblTitle">Loading...</div>
  <div class="label__sub" id="lblSub"></div>
</div>

<div class="hint">drag to explore &bull; click to enter</div>

<div class="overlay" id="overlay">
  <div class="overlay__inner">
    <button class="overlay__close" id="closeBtn">&larr; Back</button>
    <div class="overlay__content">
      <div class="overlay__img" id="detailImg"></div>
      <div class="overlay__text">
        <h1 id="detailTitle"></h1>
        <p id="detailDesc"></p>
        <span class="overlay__tag" id="detailTag"></span>
      </div>
    </div>
  </div>
</div>

<canvas id="grain"></canvas>
<canvas id="canvas"></canvas>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
    "gsap": "https://cdn.jsdelivr.net/npm/gsap@3.15.0/+esm"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import gsap from 'gsap';

const DATA = [
  { title: 'Coucher de soleil sur le Boulevard Pasteur', sub: 'Paysage', tag: 'LANDSCAPE', desc: 'Le soleil plonge derrière l\'horizon de Tanger, embrasant le boulevard Pasteur de teintes dorées et pourpres.', colors: ['#2a1a0a','#5a2a1a','#8a4a2a'], img: 'coucher-soleil-boulevard-pasteur.jpg' },
  { title: 'Terrasse de café rue pavée bleue', sub: 'Paysage', tag: 'STREET', desc: 'Une terrasse animée sur une rue pavée bleue. L\'art de vivre méditerranéen dans toute sa simplicité.', colors: ['#1a1a2a','#2a3a4a','#4a5a6a'], img: 'terrasse-cafe-rue-pavee-bleu.jpg' },
  { title: 'Église Bethelkerk', sub: 'Architecture', tag: 'ARCHITECTURE', desc: 'Le clocher en brique de l\'église Bethelkerk se dresse fièrement dans le ciel hollandais.', colors: ['#2a1a1a','#3a2a1a','#5a3a1a'], img: 'eglise-bethelkerk-clocher-brique.jpg' },
  { title: 'Cycliste costume fleurs multicolore', sub: 'Portrait', tag: 'PORTRAIT', desc: 'Un cycliste paré d\'un costume fleuri multicolore, éclat de joie dans le paysage urbain.', colors: ['#2a1a2a','#4a2a3a','#6a3a5a'], img: 'cycliste-costume-fleurs-multicolore.jpg' },
  { title: 'Chevaux galop poussière', sub: 'Paysage', tag: 'MOTION', desc: 'Galop sauvage soulevant un nuage de poussière dorée. L\'énergie brute du mouvement capturée en pleine course.', colors: ['#3a2a1a','#5a3a1a','#7a5a2a'], img: 'chevaux-trait-galop-poussiere.jpg' },

  { title: 'Famille vélo électrique façade jaune', sub: 'Portrait', tag: 'PORTRAIT', desc: 'Famille néerlandaise sur vélo électrique devant une façade jaune. Le quotidien moderne immortalisé avec tendresse.', colors: ['#2a2a1a','#4a4a2a','#6a5a3a'], img: 'famille-velo-electrique-facade-jaune.jpg' },

  { title: 'Galets plage gros plan multicolore', sub: 'Nature', tag: 'NATURE', desc: 'Gros plan sur des galets aux couleurs bigarrées, façonnés par les vagues de la Méditerranée.', colors: ['#2a2a2a','#3a3a3a','#4a3a2a'], img: 'galets-plage-gros-plan-multicolore.jpg' },

  { title: 'Combi Volkswagen rue pavée rouge', sub: 'Automobile', tag: 'STREET', desc: 'Un combi Volkswagen rouge sur une rue pavée. L\'esprit libre des road trips d\'antan.', colors: ['#2a1a1a','#4a2a1a','#6a3a1a'], img: 'combi-volkswagen-rue-pavee-rouge.jpg' },
  { title: 'Bateaux pontons quai orange', sub: 'Paysage', tag: 'LANDSCAPE', desc: 'Les bateaux se balancent doucement sur les pontons, baignés par la lumière orange du couchant.', colors: ['#2a1a0a','#4a2a1a','#6a3a2a'], img: 'bateaux-pontons-quai-orange.jpg' },
  { title: 'Femme costume château rouge', sub: 'Portrait', tag: 'PORTRAIT', desc: 'Une femme en costume élégant devant un château rouge. Portrait d\'un jour de fête.', colors: ['#2a1a1a','#4a2a2a','#5a3a3a'], img: 'femme-costume-chateau-rouge.jpg' },
  { title: 'Moto garée terrasse chrome rouge', sub: 'Automobile', tag: 'STREET', desc: 'Une moto chromée garée devant une terrasse. Le reflet du rouge sur le chrome attire l\'œil.', colors: ['#1a1a1a','#3a1a1a','#5a2a1a'], img: 'moto-garee-terrasse-chrome-rouge.jpg' },
  { title: 'Moto route circule bleue', sub: 'Automobile', tag: 'MOTION', desc: 'Une moto filant sur la route bleutée. La vitesse figée dans un instant de liberté.', colors: ['#1a1a2a','#2a2a3a','#3a3a5a'], img: 'moto-route-circule-bleue.jpg' },
  { title: 'Moto route conducteur blanche', sub: 'Automobile', tag: 'MOTION', desc: 'Un conducteur en plein trajet, la route blanche défilant sous les roues.', colors: ['#1a1a1a','#2a2a2a','#3a3a3a'], img: 'moto-route-conducteur-blanche.jpg' },
  { title: 'Moulin vent pelouse rouge', sub: 'Paysage', tag: 'LANDSCAPE', desc: 'Un moulin à vent hollandais se dresse sur la pelouse, ses ailes rouges tournant dans le vent.', colors: ['#1a2a1a','#2a3a2a','#4a2a1a'], img: 'moulin-vent-pelouse-rouge.jpg' },
  { title: 'Moulin vent tour relais brique', sub: 'Architecture', tag: 'ARCHITECTURE', desc: 'Un moulin en brique servant de tour relais. L\'architecture utilitaire du patrimoine néerlandais.', colors: ['#2a1a1a','#3a2a1a','#4a3a2a'], img: 'moulin-vent-tour-relais-brique.jpg' },
  { title: 'Moulin vent village blanc', sub: 'Paysage', tag: 'LANDSCAPE', desc: 'Un moulin blanc surplombant un village paisible. La campagne hollandaise dans toute sa sérénité.', colors: ['#1a1a2a','#2a2a3a','#3a3a4a'], img: 'moulin-vent-village-blanc.jpg' },
  { title: 'Port bateaux tour église bleu', sub: 'Paysage', tag: 'LANDSCAPE', desc: 'Le port avec ses bateaux et la tour de l\'église qui veille au loin, sous un ciel bleu.', colors: ['#1a2a3a','#2a3a4a','#3a4a5a'], img: 'port-bateaux-tour-eglise-bleu.jpg' },
  { title: 'Schermerhorne', sub: 'Paysage', tag: 'LANDSCAPE', desc: 'Les polders hollandais sous un ciel infini. La ligne d\'horizon s\'étend à perte de vue.', colors: ['#1a2a3a','#2a4a5a','#5a7a6a'], img: 'Schermerhorne_copy_793x512.jpg' },
  { title: 'Voilier navigue port bois rouge', sub: 'Paysage', tag: 'LANDSCAPE', desc: 'Un voilier rouge navigue dans le port, ses reflets dansant sur l\'eau calme.', colors: ['#2a1a1a','#3a2a1a','#4a3a2a'], img: 'voilier-navigue-port-bois-rouge.jpg' },
  { title: 'Avion léger rouge blanc piste', sub: 'Transport', tag: 'ARCHITECTURE', desc: 'Un avion léger rouge et blanc sur la piste. L\'appel de l\'aventure et du ciel ouvert.', colors: ['#1a1a1a','#2a2a2a','#4a2a1a'], img: 'avion-leger-rouge-blanc-piste.jpg' },
  { title: 'Bethelkerk clocher brique ciel bleu', sub: 'Architecture', tag: 'ARCHITECTURE', desc: 'Le clocher en brique de Bethelkerk se découpe dans le ciel bleu. Foi et patrimoine.', colors: ['#1a2a3a','#2a3a4a','#4a2a1a'], img: 'bethelkerk-clocher-brique-ciel-bleu.jpg' },
  { title: 'Cyclistes course route maillots colorés', sub: 'Sport', tag: 'MOTION', desc: 'Le peloton coloré des cyclistes en pleine course. L\'effort et la camaraderie sur la route.', colors: ['#1a1a2a','#2a2a3a','#4a2a3a'], img: 'cyclistes-course-route-maillots-colores.jpg' },
  { title: 'Dromadaires zoo debout marron', sub: 'Nature', tag: 'NATURE', desc: 'Des dromadaires bruns se tiennent debout au zoo. Un morceau de désert au cœur des Pays-Bas.', colors: ['#2a2a1a','#3a3a2a','#4a3a1a'], img: 'dromadaires-zoo-debout-marron.jpg' },
  { title: 'Fiat 1200 cabriolet rouge rue pavée', sub: 'Automobile', tag: 'STREET', desc: 'Une Fiat 1200 cabriolet rouge sur une rue pavée. Le charme italien dans les rues de Goes.', colors: ['#2a1a1a','#4a2a1a','#6a3a2a'], img: 'fiat-1200-cabriolet-rouge-rue-pavee.jpg' },
  { title: 'Ford modèle A vert route', sub: 'Automobile', tag: 'STREET', desc: 'Une Ford modèle A verte sur la route. Un morceau d\'histoire automobile préservé avec soin.', colors: ['#1a2a1a','#2a3a2a','#3a4a2a'], img: 'ford-modele-a-vert-route.jpg' },
  { title: 'Ford Taunus bleu rue pavée', sub: 'Automobile', tag: 'STREET', desc: 'Une Ford Taunus bleue stationnée rue pavée. L\'élégance sobre des voitures d\'époque.', colors: ['#1a1a2a','#2a2a4a','#3a3a5a'], img: 'ford-taunus-bleu-rue-pavee.jpg' },
  { title: 'Hudson berline jaune place pavée', sub: 'Automobile', tag: 'STREET', desc: 'Une Hudson berline jaune vif sur une place pavée. Une icône américaine en terre néerlandaise.', colors: ['#2a2a1a','#4a3a1a','#6a5a2a'], img: 'hudson-berline-jaune-place-pavee.jpg' },
  { title: 'Motocross saut air rouge bleu', sub: 'Sport', tag: 'MOTION', desc: 'Un motocross s\'envole dans les airs, rouge et bleu suspendu entre ciel et terre.', colors: ['#1a1a2a','#2a1a1a','#3a2a3a'], img: 'motocross-saut-air-rouge-bleu.jpg' },
  { title: 'Peloton cyclistes route haie verte', sub: 'Sport', tag: 'MOTION', desc: 'Le peloton des cyclistes longe une haie verte. La campagne néerlandaise comme décor de course.', colors: ['#1a2a1a','#2a3a2a','#3a4a3a'], img: 'peloton-cyclistes-route-haie-verte.jpg' },
  { title: 'Tigre couché rugit herbe', sub: 'Nature', tag: 'NATURE', desc: 'Un tigre couché dans l\'herbe, rugissant. La puissance sauvage figée dans un instant.', colors: ['#1a1a1a','#2a2a1a','#3a2a1a'], img: 'tigre-couche-rugit-herbe.jpg' },
];

// === THREE.JS ===
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 0, 0);

// --- environment sphere ---
const envCanvas = document.createElement('canvas');
envCanvas.width = 1024; envCanvas.height = 512;
const ectx = envCanvas.getContext('2d');
const grad = ectx.createLinearGradient(0, 0, 0, 512);
grad.addColorStop(0, '#0c0c1a');
grad.addColorStop(0.5, '#08080a');
grad.addColorStop(1, '#0a0a12');
ectx.fillStyle = grad;
ectx.fillRect(0, 0, 1024, 512);
// subtle texture
for (let i = 0; i < 300; i++) {
  ectx.fillStyle = `rgba(255,255,255,${Math.random()*0.015})`;
  ectx.fillRect(Math.random()*1024, Math.random()*512, 1, 1);
}
const envTex = new THREE.CanvasTexture(envCanvas);
envTex.wrapS = THREE.RepeatWrapping;
envTex.wrapT = THREE.ClampToEdgeWrapping;
const envMat = new THREE.MeshBasicMaterial({ map: envTex, side: THREE.BackSide });
const envMesh = new THREE.Mesh(new THREE.SphereGeometry(45, 64, 48), envMat);
scene.add(envMesh);

// --- starfield (points on inner sphere) ---
const starCount = 2500;
const starPos = new Float32Array(starCount * 3);
for (let i = 0; i < starCount; i++) {
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  const r = 44;
  starPos[i*3] = r * Math.sin(phi) * Math.cos(theta);
  starPos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
  starPos[i*3+2] = r * Math.cos(phi);
}
const starGeo = new THREE.BufferGeometry();
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
const starMat = new THREE.PointsMaterial({ color: 0x404060, size: 0.07, transparent: true, opacity: 0.35, sizeAttenuation: true });
const stars = new THREE.Points(starGeo, starMat);
scene.add(stars);

// --- card group ---
const group = new THREE.Group();
scene.add(group);

const R = 12, CW = 3.2, CH = 4.2;

function makeTexture(d, w=512, h=384) {
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const ctx = c.getContext('2d');
  const g = ctx.createLinearGradient(0, 0, w, h);
  d.colors.forEach((col, i) => g.addColorStop(i/(d.colors.length-1), col));
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, w, h);
  const t = new THREE.CanvasTexture(c);
  t.needsUpdate = true;
  if (d.img) {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      ctx.drawImage(img, 0, 0, w, h);
      t.needsUpdate = true;
    };
    img.src = d.img;
  }
  return t;
}

const cardMeshes = [];
const floats = [];
const lats = [-0.35, 0, 0.35];
const itemsPerRow = Math.ceil(DATA.length / 3);
let di = 0;

for (let row = 0; row < 3 && di < DATA.length; row++) {
  const lat = lats[row];
  const n = Math.min(itemsPerRow, DATA.length - di);
  const step = (Math.PI*2)/n;
  for (let i = 0; i < n && di < DATA.length; i++) {
    const lon = i*step + (row%2)*step*0.5;
    const x = R*Math.cos(lat)*Math.sin(lon);
    const y = R*Math.sin(lat);
    const z = R*Math.cos(lat)*Math.cos(lon);
    const d = DATA[di];

    // card
    const tex = makeTexture(d);
    const mesh = new THREE.Mesh(new THREE.PlaneGeometry(CW, CH), new THREE.MeshBasicMaterial({ map: tex, side: THREE.DoubleSide, transparent: true }));
    mesh.position.set(x, y, z);
    mesh.lookAt(0,0,0);
    mesh.rotateZ((Math.random()-0.5)*0.06);
    mesh.userData = { idx: di, title: d.title, sub: d.sub, tag: d.tag, desc: d.desc, colors: d.colors, img: d.img };
    group.add(mesh);
    cardMeshes.push(mesh);

    // border
    const edge = new THREE.LineSegments(
      new THREE.EdgesGeometry(new THREE.PlaneGeometry(CW, CH)),
      new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.06 })
    );
    edge.position.copy(mesh.position);
    edge.quaternion.copy(mesh.quaternion);
    edge.position.add(mesh.position.clone().normalize().multiplyScalar(0.01));
    group.add(edge);

    // shadow
    const shad = new THREE.Mesh(
      new THREE.PlaneGeometry(CW+0.15, CH+0.15),
      new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.25, side: THREE.DoubleSide })
    );
    shad.position.copy(mesh.position);
    shad.quaternion.copy(mesh.quaternion);
    shad.position.add(mesh.position.clone().normalize().multiplyScalar(-0.05));
    group.add(shad);

    floats.push({ phase: Math.random()*Math.PI*2, basePos: new THREE.Vector3(x, y, z), baseQuat: mesh.quaternion.clone() });
    di++;
  }
}

// === DRAG ===
let dragging = false;
let prev = { x: 0, y: 0 };
let vel = { x: 0, y: 0 };
const target = { x: 0, y: 0 };
const current = { x: 0, y: 0 };
const clamp = (v, lo, hi) => Math.min(hi, Math.max(lo, v));

renderer.domElement.addEventListener('pointerdown', e => {
  dragging = true;
  prev.x = e.clientX;
  prev.y = e.clientY;
  vel.x = 0; vel.y = 0;
  gsap.killTweensOf(target);
});
window.addEventListener('pointermove', e => {
  if (!dragging) return;
  const dx = e.clientX - prev.x;
  const dy = e.clientY - prev.y;
  vel.x = dy * 0.005;
  vel.y = dx * 0.005;
  target.x += vel.x;
  target.y += vel.y;
  target.x = clamp(target.x, -0.6, 0.6);
  prev.x = e.clientX;
  prev.y = e.clientY;
});
window.addEventListener('pointerup', () => {
  dragging = false;
  if (Math.abs(vel.x) > 0.0005 || Math.abs(vel.y) > 0.0005) {
    gsap.to(target, {
      x: target.x + vel.x * 14,
      y: target.y + vel.y * 14,
      duration: 2.0,
      ease: 'power3.out',
      onUpdate: () => { target.x = clamp(target.x, -0.6, 0.6); }
    });
  }
});

// === RAYCASTER ===
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();

function onCardClick(e) {
  if (dragging) return;
  const p = e.changedTouches ? e.changedTouches[0] : e;
  pointer.x = (p.clientX / window.innerWidth) * 2 - 1;
  pointer.y = -(p.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObjects(cardMeshes);
  if (hits.length) openDetail(hits[0].object.userData);
}

renderer.domElement.addEventListener('click', onCardClick);
renderer.domElement.addEventListener('touchend', e => { if (!dragging) onCardClick(e); });

// === DETAIL OVERLAY ===
let detailOpen = false;

function openDetail(d) {
  if (detailOpen) return;
  detailOpen = true;
  document.getElementById('detailTitle').textContent = d.title;
  document.getElementById('detailDesc').textContent = d.desc;
  document.getElementById('detailTag').textContent = d.tag;

  const imgEl = document.getElementById('detailImg');
  if (d.img) {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      const c = document.createElement('canvas');
      c.width = 512; c.height = 384;
      const ctx = c.getContext('2d');
      const g = ctx.createLinearGradient(0, 0, 512, 384);
      d.colors.forEach((col, i) => g.addColorStop(i/(d.colors.length-1), col));
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, 512, 384);
      ctx.drawImage(img, 0, 0, 512, 384);
      imgEl.style.backgroundImage = `url(${c.toDataURL()})`;
    };
    img.src = d.img;
  } else {
    const c = document.createElement('canvas');
    c.width = 512; c.height = 384;
    const ctx = c.getContext('2d');
    const g = ctx.createLinearGradient(0, 0, 512, 384);
    d.colors.forEach((col, i) => g.addColorStop(i/(d.colors.length-1), col));
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, 512, 384);
    for (let i = 0; i < 20; i++) {
      ctx.beginPath();
      ctx.arc(Math.random()*512, Math.random()*384, Math.random()*40+8, 0, Math.PI*2);
      ctx.fillStyle = `rgba(255,255,255,${Math.random()*0.05})`;
      ctx.fill();
    }
    imgEl.style.backgroundImage = `url(${c.toDataURL()})`;
  }

  const overlay = document.getElementById('overlay');
  const content = overlay.querySelector('.overlay__content');
  const btn = document.getElementById('closeBtn');
  gsap.set(content, { opacity: 0, y: 30 });
  gsap.set(btn, { opacity: 0, y: -10 });
  overlay.classList.add('active');
  gsap.to(content, { opacity: 1, y: 0, duration: 0.6, ease: 'power3.out', delay: 0.1 });
  gsap.to(btn, { opacity: 1, y: 0, duration: 0.4, ease: 'power2.out' });
  btn.onclick = closeDetail;
}

function closeDetail() {
  detailOpen = false;
  const overlay = document.getElementById('overlay');
  const content = overlay.querySelector('.overlay__content');
  const btn = document.getElementById('closeBtn');
  gsap.to(content, { opacity: 0, y: 20, duration: 0.25, ease: 'power2.in' });
  gsap.to(btn, { opacity: 0, y: -10, duration: 0.2 });
  gsap.to(overlay, {
    opacity: 0, duration: 0.35, delay: 0.1, ease: 'power2.in',
    onComplete: () => {
      overlay.classList.remove('active');
      gsap.set(overlay, { opacity: '' });
      gsap.set(content, { opacity: '', y: '' });
      gsap.set(btn, { opacity: '', y: '' });
    }
  });
}

document.getElementById('overlay').addEventListener('click', e => { if (e.target===e.currentTarget) closeDetail(); });
document.addEventListener('keydown', e => { if (e.key==='Escape') closeDetail(); });

// === UI TRACKING ===
function getActive() {
  let best = null, bestAngle = Infinity;
  const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(group.quaternion);
  for (const m of cardMeshes) {
    const a = dir.angleTo(m.position.clone().normalize());
    if (a < bestAngle) { bestAngle = a; best = m; }
  }
  return best;
}

function updateUI() {
  const a = getActive();
  if (!a) return;
  const d = a.userData;
  document.getElementById('lblIdx').textContent = String(d.idx+1).padStart(2,'0');
  document.getElementById('lblTitle').textContent = d.title;
  document.getElementById('lblSub').textContent = d.sub;
  document.getElementById('currIdx').textContent = String(d.idx+1).padStart(2,'0');
  document.getElementById('totalCount').textContent = String(DATA.length).padStart(2,'0');
}

// === GRAIN OVERLAY (small buffer, scaled up) ===
const grainCanvas = document.getElementById('grain');
const gctx = grainCanvas.getContext('2d');
const GRAIN_SIZE = 128;
let gw = grainCanvas.width = window.innerWidth;
let gh = grainCanvas.height = window.innerHeight;
const grainBuf = document.createElement('canvas');
grainBuf.width = GRAIN_SIZE;
grainBuf.height = Math.ceil(GRAIN_SIZE * gh / gw);
const gbCtx = grainBuf.getContext('2d');
let grainImg = gbCtx.createImageData(GRAIN_SIZE, grainBuf.height);

function drawGrain() {
  const d = grainImg.data;
  for (let i = 0; i < d.length; i += 4) {
    const v = Math.random() * 255;
    d[i] = v; d[i+1] = v; d[i+2] = v; d[i+3] = 20;
  }
  gbCtx.putImageData(grainImg, 0, 0);
  gctx.imageSmoothingEnabled = false;
  gctx.drawImage(grainBuf, 0, 0, gw, gh);
}

// === RESIZE ===
window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  camera.aspect = w/h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  gw = grainCanvas.width = w;
  gh = grainCanvas.height = h;
  grainBuf.height = Math.ceil(GRAIN_SIZE * gh / gw);
  grainImg = gbCtx.createImageData(GRAIN_SIZE, grainBuf.height);
});

// === ANIMATION ===
function animate() {
  requestAnimationFrame(animate);

  current.x += (target.x - current.x) * 0.08;
  current.y += (target.y - current.y) * 0.08;
  group.rotation.x = current.x;
  group.rotation.y = current.y;

  // float cards
  const t = Date.now() * 0.001;
  cardMeshes.forEach((m, i) => {
    const f = floats[i];
    const offset = Math.sin(t * 0.5 + f.phase) * 0.04;
    const dir = f.basePos.clone().normalize();
    m.position.copy(f.basePos).add(dir.multiplyScalar(offset));
    m.lookAt(0,0,0);
    m.rotateZ(Math.sin(t * 0.3 + f.phase * 2) * 0.03);
  });

  stars.rotation.y += 0.00015;
  stars.rotation.x += 0.00008;

  updateUI();
  drawGrain();
  renderer.render(scene, camera);
}
animate();

console.log('Spherical Gallery ready — drag to explore, click cards.');
</script>
